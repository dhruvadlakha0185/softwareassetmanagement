version: "3.9"

# ── Production stack ──────────────────────────────────────────────────────────
# Database  : PostgreSQL 16 (container or external AWS RDS)
# Storage   : AWS S3
# Backend   : FastAPI
# Frontend  : Nginx serving Vite build
#
# With bundled Postgres (single-server / staging):
#   docker compose -f docker/docker-compose.prod.yml up
#
# With external RDS (recommended for production):
#   Remove the `db` service and set DATABASE_URL to the RDS endpoint.
#
# Secrets: inject via AWS SSM Parameter Store or ECS task definition secrets.
# Never hardcode secrets in this file.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # Remove this service when using AWS RDS; set DATABASE_URL directly instead.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: drl_sam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drl_sam"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    image: ${ECR_REGISTRY}/drl-sam-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Bundled postgres:  postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/drl_sam
      # External RDS:      postgresql+asyncpg://user:pass@rds-host.amazonaws.com:5432/drl_sam
      DATABASE_URL: ${DATABASE_URL}

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      AUTH_PROVIDER: ${AUTH_PROVIDER:-jwt}

      # Storage — AWS S3 (no Supabase in production)
      STORAGE_BACKEND: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_BUCKET_ACTIVE: ${AWS_S3_BUCKET_ACTIVE:-drl-sam-active}
      AWS_S3_BUCKET_ARCHIVE: ${AWS_S3_BUCKET_ARCHIVE:-drl-sam-archive}

      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY}/drl-sam-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${API_URL}

volumes:
  postgres_data:

version: "3.9"

# ── Local development stack ───────────────────────────────────────────────────
# Database & Storage : Supabase CLI  →  run `supabase start` BEFORE this file
# Backend            : FastAPI with hot-reload via volume mount
# Frontend           : Vite dev server with hot-reload via volume mount
#
# One-time setup:
#   npm install -g supabase          # or: brew install supabase/tap/supabase
#   supabase init                    # creates supabase/config.toml (first time)
#   supabase start                   # starts Postgres (54322) + Storage (54321) + Studio (54323)
#   supabase status                  # shows SERVICE_ROLE_KEY — copy to .env
#
# Daily workflow:
#   supabase start
#   docker compose -f docker/docker-compose.yml up
#
# Stop:  docker compose down  &&  supabase stop
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      # Allows the container to reach Supabase services on the host machine.
      # Works on macOS, Windows, and Linux (Docker Engine >= 20.10).
      - "host.docker.internal:host-gateway"
    environment:
      # Supabase local Postgres (port 54322 is the direct DB port from `supabase start`)
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/postgres

      # Auth
      JWT_SECRET: local-dev-secret-change-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      # Supabase Storage — accessed through Kong API gateway (port 54321)
      STORAGE_BACKEND: supabase
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Vite frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

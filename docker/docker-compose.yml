version: "3.9"

# ── Local development stack ───────────────────────────────────────────────────
# Database  : Supabase PostgreSQL 15 (supabase/postgres)
# Storage   : Supabase Storage API (S3-compatible file storage)
# Backend   : FastAPI with hot-reload via volume mount
# Frontend  : Vite dev server with hot-reload via volume mount
#
# Start:  docker compose -f docker/docker-compose.yml up
# Stop:   docker compose -f docker/docker-compose.yml down
# Reset:  docker compose -f docker/docker-compose.yml down -v
# ─────────────────────────────────────────────────────────────────────────────

# Supabase local dev JWT tokens (standard demo values — safe for local only)
x-supabase-jwt-secret: &supabase-jwt-secret
  super-secret-jwt-token-with-at-least-32-characters-long

x-supabase-anon-key: &supabase-anon-key
  eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7kyqd6M3k7VBBnFJeP5y-jQ1E9Y-5lhFu4c

x-supabase-service-key: &supabase-service-key
  eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SBc0

services:
  # ── Supabase PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.1.0.117
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drl_sam           # app database
      JWT_SECRET: *supabase-jwt-secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── Supabase Storage API ────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v0.46.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANON_KEY: *supabase-anon-key
      SERVICE_KEY: *supabase-service-key
      PGRST_JWT_SECRET: *supabase-jwt-secret
      # Storage API uses the internal 'postgres' db for its own schema
      DATABASE_URL: postgresql://supabase_storage_admin:postgres@db:5432/postgres
      FILE_SIZE_LIMIT: "26214400"       # 25 MB
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    ports:
      - "5000:5000"
    volumes:
      - storage_data:/var/lib/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      # Database — Supabase PostgreSQL, drl_sam schema
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/drl_sam
      # Auth
      JWT_SECRET: local-dev-secret-change-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # Storage — Supabase Storage API
      STORAGE_BACKEND: supabase
      SUPABASE_STORAGE_URL: http://storage:5000
      SUPABASE_SERVICE_KEY: *supabase-service-key
      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Vite frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  storage_data:

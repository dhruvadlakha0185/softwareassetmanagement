# Supabase local development configuration
# Docs: https://supabase.com/docs/guides/cli/config
#
# Run `supabase start` to start the local stack.
# Run `supabase status` to get the SERVICE_ROLE_KEY needed for .env.
# Run `supabase stop` to stop the local stack.

[project]
id = "drl-sam"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = ""

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "25MiB"

[storage.image_transformation]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false          # We manage users via seed script, not Supabase Auth
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = false
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
